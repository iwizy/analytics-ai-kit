services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: analytics-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: analytics-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./storage/ollama:/root/.ollama

  rag-service:
    build:
      context: ./services/rag-service
    container_name: analytics-rag-service
    restart: unless-stopped
    depends_on:
      - qdrant
      - ollama
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-analytics_context}
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      DRAFT_MODEL: ${DRAFT_MODEL:-qwen3-coder:14b}
      REVIEW_MODEL: ${REVIEW_MODEL:-qwen2.5:7b}
      REFINE_MODEL: ${REFINE_MODEL:-qwen3-coder:14b}
      PIPELINE_DRAFT_MODEL: ${PIPELINE_DRAFT_MODEL:-qwen3-coder:14b}
      PIPELINE_GAP_MODEL: ${PIPELINE_GAP_MODEL:-qwen2.5:7b}
      PIPELINE_REFINE_MODEL: ${PIPELINE_REFINE_MODEL:-qwen3-coder:14b}
      DOCS_ROOT: /data/docs
      TASKS_ROOT: /data/tasks
      ARTIFACTS_ROOT: /data/artifacts
      SERVICE_STORAGE_ROOT: /data/storage
      CHUNK_SIZE: ${CHUNK_SIZE:-1200}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      SEARCH_LIMIT: ${SEARCH_LIMIT:-8}
      CONTEXT_PACK_LIMIT: ${CONTEXT_PACK_LIMIT:-12}
      PIPELINE_SECTION_WORKERS: ${PIPELINE_SECTION_WORKERS:-4}
      PIPELINE_STAGE_TIMEOUT_SEC: ${PIPELINE_STAGE_TIMEOUT_SEC:-240}
      PIPELINE_MAX_RETRIES: ${PIPELINE_MAX_RETRIES:-1}
      DOCKER_SOCKET_PATH: /var/run/docker.sock
    volumes:
      - ./docs:/data/docs
      - ./tasks:/data/tasks
      - ./artifacts:/data/artifacts
      - ./storage/rag-service:/data/storage
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
    container_name: analytics-frontend
    restart: unless-stopped
    depends_on:
      - rag-service
    ports:
      - "3000:3000"
    environment:
      UMI_APP_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
